name: Venture verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: venture-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: togeto-next-js
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: togeto-next-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run source tests
        run: npm run test:source

      - name: Build production site
        run: npm run build

      - name: Smoke test production routes
        run: npm run smoke:routes
